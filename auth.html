<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Chef IA Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C87A;--gold-dim:rgba(201,168,76,.15);
  --dark:#0E0D0B;--dark2:#161410;--dark3:#1E1C18;--dark4:#272420;
  --border:rgba(201,168,76,.18);--border2:rgba(255,255,255,.07);
  --text:#F0EDE6;--text2:#B8B2A4;--text3:#7A7468;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
}
body{
  font-family:var(--sans);background:var(--dark);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,.08) 0%,transparent 70%);
}
.container{width:100%;max-width:460px}

/* Brand */
.brand{text-align:center;margin-bottom:32px}
.brand-logo{width:100%;max-width:460px;display:block;margin:0 auto;border-radius:12px;}

/* Card */
.card{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:20px;padding:32px;position:relative;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(201,168,76,.1);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;
}

/* Tabs */
.tabs{
  display:flex;gap:0;margin-bottom:28px;
  background:var(--dark3);border:1px solid var(--border2);
  border-radius:12px;padding:4px;
}
.tab{
  flex:1;padding:10px;font-size:12px;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;border-radius:9px;transition:all .2s;font-family:var(--sans);
}
.tab.active{background:var(--dark4);color:var(--gold-light);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* Forms */
.form-panel{display:none}
.form-panel.active{display:block}

/* Fields */
.field{margin-bottom:18px}
.field-label{font-size:10px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;display:block}
.field-input{
  width:100%;font-size:13px;padding:12px 14px;
  border:1px solid var(--border2);border-radius:10px;
  background:var(--dark3);color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;font-family:var(--sans);font-weight:300;
}
.field-input:focus{border-color:rgba(201,168,76,.5);box-shadow:0 0 0 3px rgba(201,168,76,.07)}
.field-input::placeholder{color:var(--text3)}
.field-hint{font-size:11px;color:var(--text3);margin-top:5px;font-weight:300}

/* Planos */
.planos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.plano-card{
  border:1px solid var(--border2);border-radius:12px;padding:12px 8px;
  cursor:pointer;transition:all .2s;text-align:center;position:relative;
  background:var(--dark3);
}
.plano-card:hover{border-color:rgba(201,168,76,.3)}
.plano-card.selected{border-color:rgba(201,168,76,.5);background:var(--gold-dim)}
.plano-card.destaque::before{
  content:'Popular';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  font-size:9px;background:var(--gold);color:var(--dark);padding:2px 8px;
  border-radius:20px;font-weight:500;letter-spacing:.06em;white-space:nowrap;
}
.plano-nome{font-size:11px;font-weight:500;color:var(--text);margin-bottom:3px}
.plano-valor{font-family:var(--serif);font-size:16px;color:var(--gold-light);line-height:1.1}
.plano-valor small{font-size:10px;color:var(--text3);font-family:var(--sans);font-weight:300}
.plano-desc{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.4}

/* Button */
.btn{
  width:100%;margin-top:6px;padding:14px;font-size:12px;font-weight:400;
  letter-spacing:.14em;text-transform:uppercase;
  border:1px solid var(--gold);border-radius:12px;
  background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.06));
  color:var(--gold-light);cursor:pointer;transition:all .25s;font-family:var(--sans);
  position:relative;overflow:hidden;
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.22),transparent);opacity:0;transition:opacity .25s}
.btn:hover::before{opacity:1}
.btn:hover{box-shadow:0 0 32px rgba(201,168,76,.2);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Msg */
.msg{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.6;display:none}
.msg.error{background:rgba(180,40,40,.12);border:1px solid rgba(200,80,80,.25);color:#E89090}
.msg.success{background:rgba(16,110,84,.15);border:1px solid rgba(94,203,161,.25);color:#5ECBA1}

/* Footer */
.card-footer{
  text-align:center;margin-top:18px;font-size:11px;
  color:var(--text3);font-weight:300;line-height:1.6;
}
</style>
</head>
<body>

<div class="container">
  <div class="brand">
    <img src="/fotos/chefe.png" alt="Gourmet Essence" class="brand-logo">
  </div>

  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-entrar"   onclick="trocarAba('entrar')">Entrar</button>
      <button class="tab"        id="tab-cadastrar" onclick="trocarAba('cadastrar')">Criar conta</button>
    </div>

    <!-- ── PAINEL LOGIN ── -->
    <div class="form-panel active" id="painel-entrar">
      <div class="msg error"   id="erro-login"></div>
      <div class="msg success" id="ok-login"></div>
      <form onsubmit="fazerLogin(event)">
        <div class="field">
          <label class="field-label" for="login-email">E-mail</label>
          <input class="field-input" type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="field">
          <label class="field-label" for="login-senha">Senha</label>
          <input class="field-input" type="password" id="login-senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit" id="btn-login">Entrar na minha conta</button>
      </form>
    </div>

    <!-- ── PAINEL CADASTRO ── -->
    <div class="form-panel" id="painel-cadastrar">
      <div class="msg error"   id="erro-cad"></div>
      <div class="msg success" id="ok-cad"></div>
      <form onsubmit="fazerCadastro(event)">
        <div class="field">
          <label class="field-label" for="cad-nome">Nome completo</label>
          <input class="field-input" type="text" id="cad-nome" placeholder="Seu nome" required autocomplete="name">
        </div>
        <div class="field">
          <label class="field-label" for="cad-email">E-mail</label>
          <input class="field-input" type="email" id="cad-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="field">
          <label class="field-label" for="cad-senha">Senha</label>
          <input class="field-input" type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
          <div class="field-hint">Use letras e números para maior segurança</div>
        </div>
        <div class="field">
          <label class="field-label">Plano</label>
          <div class="planos-grid">
            <div class="plano-card selected" data-plano="gratuito" onclick="selecionarPlano(this)">
              <div class="plano-nome">Gratuito</div>
              <div class="plano-valor">R$ 0</div>
              <div class="plano-desc">Receitas básicas</div>
            </div>
            <div class="plano-card destaque" data-plano="mensal" onclick="selecionarPlano(this)">
              <div class="plano-nome">Mensal</div>
              <div class="plano-valor">R$ 29<small>/mês</small></div>
              <div class="plano-desc">Tudo premium</div>
            </div>
            <div class="plano-card" data-plano="anual" onclick="selecionarPlano(this)">
              <div class="plano-nome">Anual</div>
              <div class="plano-valor">R$ 249<small>/ano</small></div>
              <div class="plano-desc">30% off</div>
            </div>
          </div>
        </div>
        <button class="btn" type="submit" id="btn-cad">Criar minha conta</button>
      </form>
      <p class="card-footer">Ao criar sua conta você concorda com os termos de uso</p>
    </div>

  </div>
</div>

<script>
const API_BASE  = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8000'
  : 'https://receita-premium.onrender.com';
const TOKEN_KEY = 'chef_premium_token';
const USER_KEY  = 'chef_premium_user';

function getToken()   { return localStorage.getItem(TOKEN_KEY); }
function setToken(t)  { localStorage.setItem(TOKEN_KEY, t); }
function setUser(u)   { localStorage.setItem(USER_KEY, JSON.stringify(u)); }
function estaLogado() { return !!getToken(); }

// Redireciona se já logado
if (estaLogado()) window.location.href = '/';

// Detecta file://
if (location.protocol === 'file:') {
  document.body.innerHTML = `
    <div style="font-family:sans-serif;text-align:center;padding:60px;color:#C9A84C;background:#0E0D0B;min-height:100vh">
      <h2 style="margin-bottom:12px">Acesse pelo servidor</h2>
      <p style="color:#888">Abra no navegador:
        <a href="http://localhost:8000/auth.html" style="color:#C9A84C">
          http://localhost:8000/auth.html
        </a>
      </p>
    </div>`;
}

// ── Tabs ─────────────────────────────────────────────────────
function trocarAba(aba) {
  document.getElementById('painel-entrar').classList.toggle('active', aba === 'entrar');
  document.getElementById('painel-cadastrar').classList.toggle('active', aba === 'cadastrar');
  document.getElementById('tab-entrar').classList.toggle('active', aba === 'entrar');
  document.getElementById('tab-cadastrar').classList.toggle('active', aba === 'cadastrar');
  // Limpa mensagens ao trocar
  ['erro-login','ok-login','erro-cad','ok-cad'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

// ── Planos ────────────────────────────────────────────────────
let planoSelecionado = 'gratuito';
function selecionarPlano(el) {
  document.querySelectorAll('.plano-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  planoSelecionado = el.dataset.plano;
}

// ── Login ─────────────────────────────────────────────────────
async function fazerLogin(e) {
  e.preventDefault();
  const btn   = document.getElementById('btn-login');
  const erro  = document.getElementById('erro-login');
  const ok    = document.getElementById('ok-login');
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;

  erro.style.display = 'none';
  ok.style.display   = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res  = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'E-mail ou senha incorretos');
    setToken(data.token);
    setUser({ nome: data.nome, plano: data.plano });
    ok.textContent = `Bem-vindo, ${data.nome}! Redirecionando...`;
    ok.style.display = 'block';
    setTimeout(() => window.location.href = '/', 1000);
  } catch(err) {
    erro.textContent = err.message;
    erro.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar na minha conta';
  }
}

// ── Cadastro ──────────────────────────────────────────────────
async function fazerCadastro(e) {
  e.preventDefault();
  const btn   = document.getElementById('btn-cad');
  const erro  = document.getElementById('erro-cad');
  const ok    = document.getElementById('ok-cad');
  const nome  = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;

  erro.style.display = 'none';
  ok.style.display   = 'none';
  btn.disabled = true;
  btn.textContent = 'Criando conta...';

  try {
    const res  = await fetch(`${API_BASE}/auth/cadastro`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email, senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Erro ao criar conta');
    setToken(data.token);
    setUser({ nome: data.nome, plano: data.plano });
    ok.textContent = `Conta criada! Bem-vindo, ${data.nome}. Redirecionando...`;
    ok.style.display = 'block';
    setTimeout(() => window.location.href = '/', 1200);
  } catch(err) {
    erro.textContent = err.message;
    erro.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Criar minha conta';
  }
}
</script>
</body>
</html>
