<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Chef IA Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C87A;--gold-dim:rgba(201,168,76,.15);
  --dark:#0E0D0B;--dark2:#161410;--dark3:#1E1C18;--dark4:#272420;
  --border:rgba(201,168,76,.18);--border2:rgba(255,255,255,.07);
  --text:#F0EDE6;--text2:#B8B2A4;--text3:#7A7468;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',system-ui,sans-serif;
}
body{
  font-family:var(--sans);background:var(--dark);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,.08) 0%,transparent 70%);
}
.container{width:100%;max-width:420px}

/* Brand */
.brand{text-align:center;margin-bottom:36px}
.brand::before{content:'';display:block;width:1px;height:32px;background:linear-gradient(to bottom,transparent,var(--gold));margin:0 auto 20px}
.chef-hat{width:120px;height:120px;object-fit:contain;margin-bottom:2px;filter:invert(1) sepia(1) saturate(2) hue-rotate(5deg) brightness(1.1);mix-blend-mode:screen;}
.brand-title{font-family:var(--serif);font-size:68px;font-weight:400;color:var(--gold-light);line-height:1.1;letter-spacing:.04em}
.brand-tagline{font-family:var(--serif);font-size:16px;font-weight:300;color:var(--gold-light);letter-spacing:.04em;margin-top:8px;font-style:italic}

/* Card */
.card{
  background:var(--dark2);border:1px solid var(--border);border-radius:20px;
  padding:32px;position:relative;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(201,168,76,.1);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;
}
.card-title{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--text);margin-bottom:6px}
.card-sub{font-size:12px;color:var(--text3);font-weight:300;margin-bottom:28px}

/* Fields */
.field{margin-bottom:18px}
.field-label{font-size:10px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;display:block}
.field-input{
  width:100%;font-size:13px;padding:12px 14px;
  border:1px solid var(--border2);border-radius:10px;
  background:var(--dark3);color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;font-family:var(--sans);font-weight:300;
}
.field-input:focus{border-color:rgba(201,168,76,.5);box-shadow:0 0 0 3px rgba(201,168,76,.07)}
.field-input::placeholder{color:var(--text3)}

/* Submit */
.btn-primary{
  width:100%;margin-top:8px;padding:14px;font-size:12px;font-weight:400;
  letter-spacing:.14em;text-transform:uppercase;
  border:1px solid var(--gold);border-radius:12px;
  background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.06));
  color:var(--gold-light);cursor:pointer;transition:all .25s;font-family:var(--sans);
  position:relative;overflow:hidden;
}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.2),transparent);opacity:0;transition:opacity .25s}
.btn-primary:hover::before{opacity:1}
.btn-primary:hover{box-shadow:0 0 32px rgba(201,168,76,.2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Error / Success */
.msg{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.6;display:none}
.msg.error{background:rgba(180,40,40,.12);border:1px solid rgba(200,80,80,.25);color:#E89090}
.msg.success{background:rgba(16,110,84,.15);border:1px solid rgba(94,203,161,.25);color:#5ECBA1}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider span{height:1px;flex:1;background:var(--border2)}
.divider i{font-size:11px;color:var(--text3);font-style:normal;white-space:nowrap}

/* Link */
.link-row{text-align:center;margin-top:20px}
.link-row a{font-size:12px;color:var(--text3);text-decoration:none;transition:color .2s}
.link-row a:hover{color:var(--gold-light)}
.link-row a strong{color:var(--gold);font-weight:400}
</style>
</head>
<body>
<div class="container">

  <div class="brand">
    <img class="chef-hat" src="fotos/chapeu%20do%20chefe.jpeg" alt="Chef">
    <div class="brand-title">Gourmet Essence</div>
    <div class="brand-tagline">Descubra o prazer da alta gastronomia na sua casa.</div>
  </div>

  <div class="card">
    <div class="card-title">Bem-vindo de volta</div>
    <div class="card-sub">Entre com sua conta para acessar as receitas premium</div>

    <div class="msg error" id="msg-erro"></div>
    <div class="msg success" id="msg-ok"></div>

    <form id="form-login" onsubmit="fazerLogin(event)">
      <div class="field">
        <label class="field-label" for="email">E-mail</label>
        <input class="field-input" type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label" for="senha">Senha</label>
        <input class="field-input" type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn-primary" type="submit" id="btn-entrar">Entrar</button>
    </form>

    <div class="divider"><span></span><i>não tem conta?</i><span></span></div>

    <div class="link-row">
      <a href="/cadastro.html">Criar conta gratuita — <strong>é grátis</strong></a>
    </div>
  </div>

</div>

<script>
const API_BASE  = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8000'
  : 'https://receita-premium.onrender.com';
const TOKEN_KEY = 'chef_premium_token';
const USER_KEY  = 'chef_premium_user';
function getToken()   { return localStorage.getItem(TOKEN_KEY); }
function setToken(t)  { localStorage.setItem(TOKEN_KEY, t); }
function getUser()    { try{ return JSON.parse(localStorage.getItem(USER_KEY)); }catch{ return null; } }
function setUser(u)   { localStorage.setItem(USER_KEY, JSON.stringify(u)); }
function estaLogado() { return !!getToken(); }

async function login(email, senha) {
  const res = await fetch(`${API_BASE}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, senha })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'Credenciais inválidas');
  setToken(data.token);
  setUser({ nome: data.nome, plano: data.plano });
  return data;
}
</script>
<script>
if (location.protocol === 'file:') {
  document.body.innerHTML = '<div style="font-family:sans-serif;text-align:center;padding:60px;color:#C9A84C;background:#0E0D0B;min-height:100vh"><h2>Acesse pelo servidor</h2><p style="color:#888;margin-top:12px">Abra no navegador: <a href="http://localhost:8000/login.html" style="color:#C9A84C">http://localhost:8000/login.html</a></p></div>';
}
if (estaLogado()) window.location.href = '/';

async function fazerLogin(e) {
  e.preventDefault();
  const btn   = document.getElementById('btn-entrar');
  const erro  = document.getElementById('msg-erro');
  const ok    = document.getElementById('msg-ok');
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;

  erro.style.display = 'none';
  ok.style.display   = 'none';
  btn.disabled       = true;
  btn.textContent    = 'Entrando...';

  try {
    const data = await login(email, senha);
    ok.textContent    = `Bem-vindo, ${data.nome}! Redirecionando...`;
    ok.style.display  = 'block';
    setTimeout(() => window.location.href = '/', 1000);
  } catch(err) {
    erro.textContent   = err.message || 'E-mail ou senha incorretos.';
    erro.style.display = 'block';
    btn.disabled       = false;
    btn.textContent    = 'Entrar';
  }
}
</script>
</body>
</html>
